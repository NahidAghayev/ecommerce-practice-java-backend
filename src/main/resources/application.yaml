spring:
  application:
    name: ecommerce
  profiles:
    active: dev

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  security:
    public-paths:
      - /api/auth/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    com.aghayev.ecommerce: INFO
